version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile.prod
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./presentation/dashboard/dist:/usr/share/nginx/dashboard:ro
      - ./presentation/warehouse-pwa/dist:/usr/share/nginx/warehouse:ro
    depends_on:
      - api
    restart: unless-stopped
